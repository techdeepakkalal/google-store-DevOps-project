apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:84dba6f5c67b8bac6b5b51538e46fa4b48f4ef60
        ports:
        - containerPort: 80
