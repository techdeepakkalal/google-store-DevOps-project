apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googleclothes:242a430ee2904ddc0302c57c8267da538f697f9c
        ports:
        - containerPort: 80
