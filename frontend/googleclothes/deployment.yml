apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googleclothes:9a7a03948c7e71bf7a6faa370173b164a092546c
        ports:
        - containerPort: 80
