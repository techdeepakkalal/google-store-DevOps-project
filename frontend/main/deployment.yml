apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:d2c1aa12aea9072b09de2eeeeaf04c5b56b34fe4
        ports:
        - containerPort: 80

