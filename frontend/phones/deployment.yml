      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-phones:1d7995bda6ab887f3d2a62e72d6d31e540576c5c
        ports:
        - containerPort: 80
