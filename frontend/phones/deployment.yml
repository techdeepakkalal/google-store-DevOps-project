apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-phones:242a430ee2904ddc0302c57c8267da538f697f9c
        ports:
        - containerPort: 80
