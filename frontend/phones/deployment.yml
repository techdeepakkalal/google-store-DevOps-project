  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:d2c1aa12aea9072b09de2eeeeaf04c5b56b34fe4
        ports:
        - containerPort: 80
