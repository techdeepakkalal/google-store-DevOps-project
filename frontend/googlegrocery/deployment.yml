apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:d2c1aa12aea9072b09de2eeeeaf04c5b56b34fe4
        ports:
        - containerPort: 80
