apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googlegrocery:242a430ee2904ddc0302c57c8267da538f697f9c
        ports:
        - containerPort: 80
