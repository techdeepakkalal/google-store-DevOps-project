apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:b3ec627810cc129b4eca0d1cc99537f8b4767dd1
        ports:
        - containerPort: 80
