apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:84dba6f5c67b8bac6b5b51538e46fa4b48f4ef60
        ports:
        - containerPort: 80
