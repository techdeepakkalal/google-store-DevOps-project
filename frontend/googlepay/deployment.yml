apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googlepay:9a7a03948c7e71bf7a6faa370173b164a092546c
        ports:
        - containerPort: 80
