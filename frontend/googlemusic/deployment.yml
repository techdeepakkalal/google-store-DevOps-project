apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:b3ec627810cc129b4eca0d1cc99537f8b4767dd1
        ports:
        - containerPort: 80
