apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:d2c1aa12aea9072b09de2eeeeaf04c5b56b34fe4
        ports:
        - containerPort: 80
