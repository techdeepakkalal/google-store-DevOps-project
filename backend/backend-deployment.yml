apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-backend:632e0695b93e2a149a7fb60a77948162fce98334
          ports:
            - containerPort: 5000
