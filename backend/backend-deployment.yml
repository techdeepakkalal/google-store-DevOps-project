apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-backend:9a7a03948c7e71bf7a6faa370173b164a092546c
          ports:
            - containerPort: 5000
